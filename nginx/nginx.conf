upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Assets com cache longo — alias strip o prefixo /contratid/assets/ corretamente
    location /contratid/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }

    location = / {
        return 301 /contratid/;
    }

    # SPA — alias mapeia /contratid/* para /usr/share/nginx/html/*
    # Vite gera /contratid/assets/xxx.js mas os arquivos ficam em /assets/xxx.js no dist
    location /contratid/ {
        alias /usr/share/nginx/html/;
        index index.html;
        add_header Content-Security-Policy "frame-ancestors 'self' https://uidsoftware.com.br https://*.uidsoftware.com.br";
        try_files $uri $uri/ /contratid/index.html;
    }

    location / {
        return 301 /contratid/;
    }
}
