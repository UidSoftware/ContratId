upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SW removido — 404 desregistra no browser
    location = /contratid/sw.js { return 404; }
    location ~* ^/contratid/workbox-.+\.js$ { return 404; }
    location = /contratid/registerSW.js { return 404; }

    # index.html nunca em cache — garante JS mais recente
    location = /contratid/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Content-Security-Policy "frame-ancestors 'self' https://uidsoftware.com.br https://*.uidsoftware.com.br";
    }

    location /contratid/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }

    location = / {
        return 301 /contratid/;
    }

    location = /contratid/clear-sw {
        add_header Content-Type 'text/html; charset=utf-8';
        add_header Cache-Control 'no-store';
        return 200 '<!DOCTYPE html><html><head><meta charset=utf-8><title>Limpando SW...</title></head><body><p>Removendo Service Worker...</p><script>navigator.serviceWorker.getRegistrations().then(function(regs){var ps=regs.map(function(r){return r.unregister();});return Promise.all(ps);}).then(function(){window.location.replace("/contratid/");}).catch(function(){window.location.replace("/contratid/");});</script></body></html>';
    }

    location /contratid/ {
        alias /usr/share/nginx/html/;
        index index.html;
        add_header Content-Security-Policy "frame-ancestors 'self' https://uidsoftware.com.br https://*.uidsoftware.com.br";
        try_files $uri $uri/ /contratid/index.html;
    }

    location / {
        return 301 /contratid/;
    }
}
