services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: contratid
      POSTGRES_USER: uid
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uid -d contratid"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    volumes:
      - media:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: build
    command: sh -c "cp -r /app/dist/. /output/"
    volumes:
      - frontend_build:/output

  nginx:
    image: nginx:alpine
    ports:
      - "8003:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static
      - media:/app/media:ro
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  media:
  static_volume:
  frontend_build:
